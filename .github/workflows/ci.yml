name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Type-check + lint the app code.
  # -----------------------------------------------------------------------
  typecheck:
    name: Typecheck (app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit

  # -----------------------------------------------------------------------
  # Jest unit + component tests for the React Native app.
  # -----------------------------------------------------------------------
  unit:
    name: Unit + component tests (app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm test -- --ci --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-coverage
          path: coverage/

  # -----------------------------------------------------------------------
  # Cloud Functions: build + unit tests.
  # -----------------------------------------------------------------------
  functions:
    name: Cloud Functions tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test -- --ci

  # -----------------------------------------------------------------------
  # Firestore security rules tests against the Firebase emulator.
  # Requires Java (for the emulator) and the Firebase CLI.
  # -----------------------------------------------------------------------
  firestore-rules:
    name: Firestore rules tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests/firestore-rules
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tests/firestore-rules/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - run: npm ci
      - run: npm test

  # -----------------------------------------------------------------------
  # Maestro E2E flows on iOS simulator.
  # Slow + macOS-only; runs on main branch pushes only.
  # -----------------------------------------------------------------------
  e2e-ios:
    name: Maestro E2E (iOS)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-14
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
      # NOTE: building the iOS app + booting a simulator is project-specific.
      # The simplest path with Expo is `eas build --local` or a managed
      # `expo prebuild && xcodebuild` step. Wire those up before enabling
      # this job in CI for real PRs.
      - name: Run Maestro flows
        run: maestro test .maestro/flows
